<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN Directory - Special Needs Resources</title>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --accent: #6366f1;
            --accent-light: #eef2ff;
            --green: #22c55e;
            --blue: #3b82f6;
            --purple: #a855f7;
            --pink: #ec4899;
            --orange: #f97316;
            --teal: #14b8a6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 20px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 16px;
            color: white;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .controls {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .search-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--bg-primary);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
        }

        .filter-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
        }

        select {
            padding: 10px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            background: var(--bg-primary);
            min-width: 150px;
            cursor: pointer;
        }

        .age-filter {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .age-filter input {
            width: 60px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
        }

        .reset-btn {
            padding: 10px 20px;
            background: var(--text-secondary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: auto;
        }

        .reset-btn:hover {
            background: var(--text-primary);
        }

        .results-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .results-count {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .sort-buttons {
            display: flex;
            gap: 8px;
        }

        .sort-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sort-btn:hover, .sort-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .vendors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .vendor-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
        }

        .vendor-card:hover {
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }

        .vendor-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .vendor-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .category-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .cat-dance { background: #fce7f3; color: #be185d; }
        .cat-sports { background: #dcfce7; color: #166534; }
        .cat-museum { background: #e0e7ff; color: #3730a3; }
        .cat-attraction { background: #fef3c7; color: #92400e; }
        .cat-camps { background: #ccfbf1; color: #0f766e; }
        .cat-music { background: #f3e8ff; color: #7c3aed; }
        .cat-social { background: #ffe4e6; color: #be123c; }
        .cat-art { background: #fae8ff; color: #a21caf; }

        .vendor-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .vendor-description {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .vendor-contact {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .contact-btn {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }

        .contact-btn.phone {
            background: #dcfce7;
            color: #166534;
        }

        .contact-btn.email {
            background: #e0e7ff;
            color: #3730a3;
        }

        .contact-btn.website {
            background: #f3e8ff;
            color: #7c3aed;
        }

        .contact-btn:hover {
            filter: brightness(0.95);
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .no-results h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .expand-btn {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0;
            margin-top: 5px;
        }

        .vendor-description.expanded {
            -webkit-line-clamp: unset;
        }

        .vendor-card {
            cursor: pointer;
        }

        /* Vendor Detail Page */
        .vendor-detail-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .vendor-detail-overlay.active {
            display: block;
        }

        .detail-back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 20px;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .detail-back-btn:hover {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
        }

        .detail-header {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .detail-header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .detail-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .detail-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .detail-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .detail-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .detail-section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-description {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .detail-contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .detail-contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: var(--bg-primary);
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .detail-contact-item:hover {
            background: var(--accent-light);
        }

        .detail-contact-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .detail-contact-icon.phone { background: #dcfce7; }
        .detail-contact-icon.email { background: #e0e7ff; }
        .detail-contact-icon.website { background: #f3e8ff; }
        .detail-contact-icon.contact { background: #fef3c7; }

        .detail-contact-info {
            flex: 1;
        }

        .detail-contact-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-contact-value {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .related-vendors {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .related-card {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .related-card:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .related-card-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .related-card-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .stats-bar {
                gap: 15px;
            }

            .stat-value {
                font-size: 1.4rem;
            }

            .vendors-grid {
                grid-template-columns: 1fr;
            }

            .search-row, .filter-row {
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }

            .filter-group {
                width: 100%;
            }

            select {
                width: 100%;
            }

            .reset-btn {
                width: 100%;
                margin-left: 0;
                margin-top: 10px;
            }

            .results-info {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .sort-buttons {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌟 SN Directory</h1>
        <p>Special Needs Resources • Cobb County & Metro Atlanta</p>
        <div class="stats-bar">
            <div class="stat">

                <div class="stat-label">Resources</div>
            </div>

                <div class="stat-label">Categories</div>
            </div>
            <div class="stat">
                <div class="stat-value">0-Adult</div>
                <div class="stat-label">Ages Served</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="search-row">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by name, description, or keyword...">
            </div>
        </div>
        <div class="filter-row">
            <div class="filter-group">
                <label>Category</label>
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="Dance">🩰 Dance</option>
                    <option value="Sports & Recreation">🏊 Sports & Recreation</option>
                    <option value="Museum">🏛️ Museum</option>
                    <option value="Attraction">🎭 Attraction</option>
                    <option value="Camps">🏕️ Camps</option>
                    <option value="Music Classes">🎵 Music</option>
                    <option value="Art Classes">🎨 Art</option>
                    <option value="Social">👥 Social</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Child's Age</label>
                <div class="age-filter">
                    <input type="number" id="ageFilter" min="0" max="99" placeholder="Age">
                    <span>years</span>
                </div>
            </div>
            <div class="filter-group">
                <label>Location</label>
                <select id="locationFilter">
                    <option value="">All Locations</option>
                    <option value="Atlanta">Atlanta</option>
                    <option value="Marietta">Marietta</option>
                    <option value="Kennesaw">Kennesaw</option>
                    <option value="Roswell">Roswell</option>
                    <option value="Acworth">Acworth</option>
                    <option value="Cartersville">Cartersville</option>
                    <option value="Austell">Austell</option>
                </select>
            </div>
            <button class="reset-btn" onclick="resetFilters()">Reset Filters</button>
        </div>
    </div>

    <div class="results-info">
        <div class="results-count"><span id="resultsCount">28</span> resources found</div>
        <div class="sort-buttons">
            <button class="sort-btn active" onclick="sortBy('name')">A-Z</button>
            <button class="sort-btn" onclick="sortBy('category')">Category</button>
            <button class="sort-btn" onclick="sortBy('ageMin')">Age (Young→Old)</button>
        </div>
    </div>

    <div class="vendors-grid" id="vendorsGrid"></div>

    <!-- Vendor Detail Overlay -->
    <div class="vendor-detail-overlay" id="vendorDetailOverlay">
        <button class="detail-back-btn" onclick="closeVendorDetail()">← Back to Directory</button>
        <div id="vendorDetailContent"></div>
    </div>

        let currentSort = 'name';
        let filteredVendors = [...vendors];

        function getCategoryClass(category) {
            const map = {
                'Dance': 'cat-dance',
                'Sports & Recreation': 'cat-sports',
                'Museum': 'cat-museum',
                'Attraction': 'cat-attraction',
                'Camps': 'cat-camps',
                'Music Classes': 'cat-music',
                'Art Classes': 'cat-art',
                'Social': 'cat-social'
            };
            return map[category] || '';
        }

        function getCategoryEmoji(category) {
            const map = {
                'Dance': '🩰',
                'Sports & Recreation': '🏊',
                'Museum': '🏛️',
                'Attraction': '🎭',
                'Camps': '🏕️',
                'Music Classes': '🎵',
                'Art Classes': '🎨',
                'Social': '👥'
            };
            return map[category] || '📍';
        }

        function formatAgeRange(min, max) {
            if (max >= 99) return `${min}–Adult`;
            return `${min}–${max}`;
        }

        function renderVendors() {
            const grid = document.getElementById('vendorsGrid');
            
            if (filteredVendors.length === 0) {
                grid.innerHTML = `
                    <div class="no-results" style="grid-column: 1/-1;">
                        <h3>No resources found</h3>
                        <p>Try adjusting your filters or search terms</p>
                    </div>
                `;
                document.getElementById('resultsCount').textContent = '0';
                return;
            }

            document.getElementById('resultsCount').textContent = filteredVendors.length;

            grid.innerHTML = filteredVendors.map((v, idx) => {
                const vendorIdx = vendors.findIndex(vendor => vendor.name === v.name);
                return `
                <div class="vendor-card" onclick="showVendorDetail(${vendorIdx})">
                    <div class="vendor-header">
                        <div class="vendor-name">${v.name}</div>
                        <span class="category-badge ${getCategoryClass(v.category)}">${getCategoryEmoji(v.category)} ${v.category}</span>
                    </div>
                    <div class="vendor-meta">
                        <span class="meta-item">👶 Ages ${formatAgeRange(v.ageMin, v.ageMax)}</span>
                        <span class="meta-item">📍 ${v.address || v.location}</span>
                    </div>
                    <div class="vendor-description" id="desc-${idx}">${v.description.substring(0, 150)}...</div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
                        <span style="font-size:0.85rem;color:var(--accent);font-weight:600">View Details →</span>
                        <div style="display:flex;gap:6px" onclick="event.stopPropagation()">
                            ${v.phone ? `<a href="tel:${v.phone}" class="contact-btn phone" style="padding:6px 10px">📞</a>` : ''}
                            ${v.email ? `<a href="mailto:${v.email}" class="contact-btn email" style="padding:6px 10px">✉️</a>` : ''}
                            ${v.website ? `<a href="${v.website}" target="_blank" class="contact-btn website" style="padding:6px 10px">🌐</a>` : ''}
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const age = document.getElementById('ageFilter').value;
            const location = document.getElementById('locationFilter').value;

            filteredVendors = vendors.filter(v => {
                // Search filter
                if (search) {
                    const searchable = `${v.name} ${v.description} ${v.category} ${v.location}`.toLowerCase();
                    if (!searchable.includes(search)) return false;
                }

                // Category filter
                if (category && v.category !== category) return false;

                // Age filter
                if (age) {
                    const ageNum = parseInt(age);
                    if (ageNum < v.ageMin || ageNum > v.ageMax) return false;
                }

                // Location filter
                if (location && !v.location.toLowerCase().includes(location.toLowerCase())) return false;

                return true;
            });

            sortVendors();
            renderVendors();
        }

        function sortBy(field) {
            currentSort = field;
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            sortVendors();
            renderVendors();
        }

        function sortVendors() {
            filteredVendors.sort((a, b) => {
                if (currentSort === 'name') return a.name.localeCompare(b.name);
                if (currentSort === 'category') return a.category.localeCompare(b.category);
                if (currentSort === 'ageMin') return a.ageMin - b.ageMin;
                return 0;
            });
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = '';
            document.getElementById('ageFilter').value = '';
            document.getElementById('locationFilter').value = '';
            filteredVendors = [...vendors];
            sortVendors();
            renderVendors();
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('categoryFilter').addEventListener('change', applyFilters);
        document.getElementById('ageFilter').addEventListener('input', applyFilters);
        document.getElementById('locationFilter').addEventListener('change', applyFilters);

        // Vendor Detail Functions
        function showVendorDetail(idx) {
            const v = vendors[idx];
            if (!v) return;

            // Find related vendors (same category, excluding current)
            const related = vendors.filter(vendor => 
                vendor.category === v.category && vendor.name !== v.name
            ).slice(0, 4);

            const content = document.getElementById('vendorDetailContent');
            content.innerHTML = `
                <div class="detail-header">
                    <div class="detail-header-top">
                        <div>
                            <div class="detail-name">${v.name}</div>
                            <span class="category-badge ${getCategoryClass(v.category)}" style="font-size:0.85rem;padding:6px 14px">
                                ${getCategoryEmoji(v.category)} ${v.category}
                            </span>
                        </div>
                    </div>
                    <div class="detail-meta">
                        <div class="detail-meta-item">👶 Ages ${formatAgeRange(v.ageMin, v.ageMax)}</div>
                        <div class="detail-meta-item">📍 ${v.address || v.location}</div>
                        ${v.contact ? `<div class="detail-meta-item">👤 ${v.contact}</div>` : ''}
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">📋 About</div>
                    <div class="detail-description">${v.description}</div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">📞 Contact Information</div>
                    <div class="detail-contact-grid">
                        ${v.phone ? `
                            <a href="tel:${v.phone}" class="detail-contact-item">
                                <div class="detail-contact-icon phone">📞</div>
                                <div class="detail-contact-info">
                                    <div class="detail-contact-label">Phone</div>
                                    <div class="detail-contact-value">${v.phone}</div>
                                </div>
                            </a>
                        ` : ''}
                        ${v.email ? `
                            <a href="mailto:${v.email}" class="detail-contact-item">
                                <div class="detail-contact-icon email">✉️</div>
                                <div class="detail-contact-info">
                                    <div class="detail-contact-label">Email</div>
                                    <div class="detail-contact-value">${v.email}</div>
                                </div>
                            </a>
                        ` : ''}
                        ${v.website ? `
                            <a href="${v.website}" target="_blank" class="detail-contact-item">
                                <div class="detail-contact-icon website">🌐</div>
                                <div class="detail-contact-info">
                                    <div class="detail-contact-label">Website</div>
                                    <div class="detail-contact-value">Visit Website →</div>
                                </div>
                            </a>
                        ` : ''}
                        ${v.contact ? `
                            <div class="detail-contact-item">
                                <div class="detail-contact-icon contact">👤</div>
                                <div class="detail-contact-info">
                                    <div class="detail-contact-label">Contact Person</div>
                                    <div class="detail-contact-value">${v.contact}</div>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">📍 Location & Service Area</div>
                    <div class="detail-description">
                        ${v.address ? `<strong>Address:</strong> ${v.address}` : `<strong>${v.location}</strong>`}
                        <br><br>
                        ${v.address ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(v.address)}" target="_blank" style="color:var(--accent);text-decoration:none;font-weight:600">📍 Get Directions →</a><br><br>` : ''}
                        Serving Cobb County and Metro Atlanta area.
                        <br><br>
                        <strong>Ages Served:</strong> ${formatAgeRange(v.ageMin, v.ageMax)} years old
                    </div>
                </div>

                ${related.length > 0 ? `
                    <div class="detail-section">
                        <div class="detail-section-title">🔗 Similar Resources in ${v.category}</div>
                        <div class="related-vendors">
                            ${related.map(r => {
                                const relIdx = vendors.findIndex(vendor => vendor.name === r.name);
                                return `
                                    <div class="related-card" onclick="showVendorDetail(${relIdx})">
                                        <div class="related-card-name">${r.name}</div>
                                        <div class="related-card-meta">📍 ${r.location} • Ages ${formatAgeRange(r.ageMin, r.ageMax)}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                ` : ''}
            `;

            document.getElementById('vendorDetailOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
            window.scrollTo(0, 0);
        }

        function closeVendorDetail() {
            document.getElementById('vendorDetailOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeVendorDetail();
        });

        // Initial render
        sortVendors();
        renderVendors();
    </script>
</body>
