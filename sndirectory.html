    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --accent: #6366f1;
            --accent-light: #eef2ff;
            --green: #22c55e;
            --blue: #3b82f6;
            --purple: #a855f7;
            --pink: #ec4899;
            --orange: #f97316;
            --teal: #14b8a6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 20px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 16px;
            color: white;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .controls {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .search-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--bg-primary);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
        }

        .filter-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
        }

        select {
            padding: 10px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            background: var(--bg-primary);
            min-width: 150px;
            cursor: pointer;
        }

        .age-filter {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .age-filter input {
            width: 60px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
        }

        .reset-btn {
            padding: 10px 20px;
            background: var(--text-secondary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: auto;
        }

        .reset-btn:hover {
            background: var(--text-primary);
        }

        .results-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .results-count {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .sort-buttons {
            display: flex;
            gap: 8px;
        }

        .sort-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sort-btn:hover, .sort-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .vendors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .vendor-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
        }

        .vendor-card:hover {
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }

        .vendor-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .vendor-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .category-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .cat-dance { background: #fce7f3; color: #be185d; }
        .cat-sports { background: #dcfce7; color: #166534; }
        .cat-museum { background: #e0e7ff; color: #3730a3; }
        .cat-attraction { background: #fef3c7; color: #92400e; }
        .cat-camps { background: #ccfbf1; color: #0f766e; }
        .cat-music { background: #f3e8ff; color: #7c3aed; }
        .cat-social { background: #ffe4e6; color: #be123c; }
        .cat-art { background: #fae8ff; color: #a21caf; }

        .vendor-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .vendor-description {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .vendor-contact {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .contact-btn {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }

        .contact-btn.phone {
            background: #dcfce7;
            color: #166534;
        }

        .contact-btn.email {
            background: #e0e7ff;
            color: #3730a3;
        }

        .contact-btn.website {
            background: #f3e8ff;
            color: #7c3aed;
        }

        .contact-btn:hover {
            filter: brightness(0.95);
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .no-results h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .expand-btn {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0;
            margin-top: 5px;
        }

        .vendor-description.expanded {
            -webkit-line-clamp: unset;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .stats-bar {
                gap: 15px;
            }

            .stat-value {
                font-size: 1.4rem;
            }

            .vendors-grid {
                grid-template-columns: 1fr;
            }

            .search-row, .filter-row {
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }

            .filter-group {
                width: 100%;
            }

            select {
                width: 100%;
            }

            .reset-btn {
                width: 100%;
                margin-left: 0;
                margin-top: 10px;
            }

            .results-info {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .sort-buttons {
                flex-wrap: wrap;
            }
        }
    </style>
</head>

        let currentSort = 'name';
        let filteredVendors = [...vendors];

        function getCategoryClass(category) {
            const map = {
                'Dance': 'cat-dance',
                'Sports & Recreation': 'cat-sports',
                'Museum': 'cat-museum',
                'Attraction': 'cat-attraction',
                'Camps': 'cat-camps',
                'Music Classes': 'cat-music',
                'Art Classes': 'cat-art',
                'Social': 'cat-social'
            };
            return map[category] || '';
        }

        function getCategoryEmoji(category) {
            const map = {
                'Dance': '🩰',
                'Sports & Recreation': '🏊',
                'Museum': '🏛️',
                'Attraction': '🎭',
                'Camps': '🏕️',
                'Music Classes': '🎵',
                'Art Classes': '🎨',
                'Social': '👥'
            };
            return map[category] || '📍';
        }

        function formatAgeRange(min, max) {
            if (max >= 99) return `${min}–Adult`;
            return `${min}–${max}`;
        }

        function renderVendors() {
            const grid = document.getElementById('vendorsGrid');
            
            if (filteredVendors.length === 0) {
                grid.innerHTML = `
                    <div class="no-results" style="grid-column: 1/-1;">
                        <h3>No resources found</h3>
                        <p>Try adjusting your filters or search terms</p>
                    </div>
                `;
                document.getElementById('resultsCount').textContent = '0';
                return;
            }

            document.getElementById('resultsCount').textContent = filteredVendors.length;

            grid.innerHTML = filteredVendors.map((v, idx) => `
                <div class="vendor-card">
                    <div class="vendor-header">
                        <div class="vendor-name">${v.name}</div>
                        <span class="category-badge ${getCategoryClass(v.category)}">${getCategoryEmoji(v.category)} ${v.category}</span>
                    </div>
                    <div class="vendor-meta">
                        <span class="meta-item">👶 Ages ${formatAgeRange(v.ageMin, v.ageMax)}</span>
                        <span class="meta-item">📍 ${v.location}</span>
                    </div>
                    <div class="vendor-description" id="desc-${idx}">${v.description}</div>
                    <button class="expand-btn" onclick="toggleDescription(${idx})">Read more</button>
                    <div class="vendor-contact">
                        ${v.phone ? `<a href="tel:${v.phone}" class="contact-btn phone">📞 ${v.phone}</a>` : ''}
                        ${v.email ? `<a href="mailto:${v.email}" class="contact-btn email">✉️ Email</a>` : ''}
                        ${v.website ? `<a href="${v.website}" target="_blank" class="contact-btn website">🌐 Website</a>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function toggleDescription(idx) {
            const desc = document.getElementById(`desc-${idx}`);
            desc.classList.toggle('expanded');
            const btn = desc.nextElementSibling;
            btn.textContent = desc.classList.contains('expanded') ? 'Show less' : 'Read more';
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const age = document.getElementById('ageFilter').value;
            const location = document.getElementById('locationFilter').value;

            filteredVendors = vendors.filter(v => {
                // Search filter
                if (search) {
                    const searchable = `${v.name} ${v.description} ${v.category} ${v.location}`.toLowerCase();
                    if (!searchable.includes(search)) return false;
                }

                // Category filter
                if (category && v.category !== category) return false;

                // Age filter
                if (age) {
                    const ageNum = parseInt(age);
                    if (ageNum < v.ageMin || ageNum > v.ageMax) return false;
                }

                // Location filter
                if (location && !v.location.toLowerCase().includes(location.toLowerCase())) return false;

                return true;
            });

            sortVendors();
            renderVendors();
        }

        function sortBy(field) {
            currentSort = field;
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            sortVendors();
            renderVendors();
        }

        function sortVendors() {
            filteredVendors.sort((a, b) => {
                if (currentSort === 'name') return a.name.localeCompare(b.name);
                if (currentSort === 'category') return a.category.localeCompare(b.category);
                if (currentSort === 'ageMin') return a.ageMin - b.ageMin;
                return 0;
            });
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = '';
            document.getElementById('ageFilter').value = '';
            document.getElementById('locationFilter').value = '';
            filteredVendors = [...vendors];
            sortVendors();
            renderVendors();
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('categoryFilter').addEventListener('change', applyFilters);
        document.getElementById('ageFilter').addEventListener('input', applyFilters);
        document.getElementById('locationFilter').addEventListener('change', applyFilters);

        // Initial render
        sortVendors();
        renderVendors();
    </script>
</body>
</html>
