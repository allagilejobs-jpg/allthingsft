<html lang="en">

    <style>
        :root {
            --bg-primary: #0a0f1a;
            --bg-secondary: #111827;
            --bg-card: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --border: #374151;
            --gold: #fbbf24;
            --red: #ef4444;
            --blue: #3b82f6;
            --green: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 20px;
            background: linear-gradient(135deg, #1e3a5f 0%, #0a1628 100%);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gold);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: var(--border);
        }

        .filter-btn.active {
            background: var(--blue);
            border-color: var(--blue);
        }

        .date-section {
            margin-bottom: 30px;
        }

        .date-header {
            background: var(--bg-secondary);
            padding: 15px 20px;
            border-radius: 10px 10px 0 0;
            border: 1px solid var(--border);
            border-bottom: none;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .date-badge {
            background: var(--gold);
            color: #000;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .date-info {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .games-list {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 0 0 10px 10px;
        }

        .game-card {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: 100px 1fr 150px;
            gap: 20px;
            align-items: center;
            transition: background 0.2s;
        }

        .game-card:last-child {
            border-bottom: none;
        }

        .game-card:hover {
            background: rgba(255,255,255,0.03);
        }

        .game-time {
            text-align: center;
        }

        .game-time .time {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .game-time .timezone {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .game-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .matchup {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .matchup .vs {
            color: var(--text-secondary);
            font-weight: 400;
            margin: 0 8px;
        }

        .game-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .game-venue {
            text-align: right;
        }

        .venue-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .venue-city {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .stage-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .stage-group { background: var(--blue); }
        .stage-r32 { background: var(--green); }
        .stage-r16 { background: #8b5cf6; }
        .stage-qf { background: #f59e0b; }
        .stage-sf { background: #ef4444; }
        .stage-final { background: linear-gradient(90deg, #fbbf24, #f59e0b); color: #000; }
        .stage-3rd { background: #78716c; }

        .usa-game {
            border-left: 4px solid var(--gold);
        }

        .city-tag {
            display: inline-block;
            background: var(--bg-secondary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-left: 10px;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .stats {
                gap: 15px;
            }

            .stat-value {
                font-size: 1.4rem;
            }

            .game-card {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .game-time {
                text-align: left;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .game-venue {
                text-align: left;
            }

            .filters {
                gap: 6px;
            }

            .filter-btn {
                padding: 8px 12px;
                font-size: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 20px 15px;
            }

            .header h1 {
                font-size: 1.3rem;
            }

            .date-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .matchup {
                font-size: 0.95rem;
            }

            .game-meta {
                gap: 8px;
            }

            .meta-item {
                font-size: 0.75rem;
            }
        }
    </style>
</head>

        function getStageClass(stage) {
            const map = {
                'Group': 'stage-group',
                'R32': 'stage-r32',
                'R16': 'stage-r16',
                'QF': 'stage-qf',
                'SF': 'stage-sf',
                'Final': 'stage-final',
                '3rd': 'stage-3rd'
            };
            return map[stage] || 'stage-group';
        }

        function getStageName(stage) {
            const map = {
                'Group': 'Group Stage',
                'R32': 'Round of 32',
                'R16': 'Round of 16',
                'QF': 'Quarter-Final',
                'SF': 'Semi-Final',
                'Final': 'Final',
                '3rd': '3rd Place'
            };
            return map[stage] || stage;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T12:00:00');
            return date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        }

        function renderSchedule(filteredGames) {
            const container = document.getElementById('schedule');
            const grouped = {};
            
            filteredGames.forEach(game => {
                if (!grouped[game.date]) {
                    grouped[game.date] = [];
                }
                grouped[game.date].push(game);
            });

            let html = '';
            Object.keys(grouped).sort().forEach(date => {
                const dayGames = grouped[date];
                html += `
                    <div class="date-section" data-date="${date}">
                        <div class="date-header">
                            <span class="date-badge">${formatDate(date)}</span>
                            <span class="date-info">${dayGames.length} game${dayGames.length > 1 ? 's' : ''}</span>
                        </div>
                        <div class="games-list">
                            ${dayGames.map(game => `
                                <div class="game-card ${game.usaGame ? 'usa-game' : ''}" data-city="${game.city.toLowerCase()}">
                                    <div class="game-time">
                                        <div class="time">${game.time}</div>
                                        <div class="timezone">ET</div>
                                    </div>
                                    <div class="game-details">
                                        <div class="matchup">
                                            ${game.matchup}
                                            ${game.usaGame ? '<span class="city-tag">🇺🇸 USA</span>' : ''}
                                        </div>
                                        <div class="game-meta">
                                            <span class="stage-badge ${getStageClass(game.stage)}">${getStageName(game.stage)}</span>
                                            ${game.group ? `<span class="meta-item">Group ${game.group}</span>` : ''}
                                            <span class="meta-item">📍 ${game.city}</span>
                                        </div>
                                    </div>
                                    <div class="game-venue">
                                        <div class="venue-name">${game.venue}</div>
                                        <div class="venue-city">${game.city}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function filterByCity(city) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (city === 'all') {
                renderSchedule(games);
            } else {
                const filtered = games.filter(g => g.city.toLowerCase().includes(city.toLowerCase()));
                renderSchedule(filtered);
            }
        }

        // Initial render
        renderSchedule(games);
    </script>
</body>
</html>
